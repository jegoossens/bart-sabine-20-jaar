<head>
<meta charset="UTF-8">

<title>Bart & Sabine - 20 Jaar Getrouwd</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #000; color: #fff; font-family: 'Inter', sans-serif;
  overflow: hidden; height: 100vh; width: 100vw; cursor: none;
}
body.paused { cursor: default; }
#slideshow { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; }
.slide-img {
  position: absolute; inset: 0;
  background-size: contain; background-repeat: no-repeat; background-position: center;
  opacity: 0; transition: opacity 1.2s ease;
  animation: kenburns 12s ease-in-out infinite alternate;
}
.slide-img.active { opacity: 1; }
@keyframes kenburns {
  0%   { transform: scale(1.00) translate(0, 0); }
  100% { transform: scale(1.04) translate(-0.5%, -0.3%); }
}
.slide-img::after {
  content: ''; position: absolute; inset: 0; pointer-events: none;
  background: linear-gradient(to top, rgba(0,0,0,.75) 0%, rgba(0,0,0,.15) 30%, rgba(0,0,0,.0) 50%, rgba(0,0,0,.15) 80%, rgba(0,0,0,.4) 100%);
}
.slide-card {
  position: absolute; inset: 0; display: flex; flex-direction: column;
  align-items: center; justify-content: center; text-align: center;
  opacity: 0; transition: opacity 1.2s ease; padding: 2rem;
}
.slide-card.active { opacity: 1; }
.slide-card.intro { background: linear-gradient(135deg, #1a0a2e 0%, #2d1b4e 30%, #5b2c6f 70%, #1a0a2e 100%); }
.slide-card.wedding { background: linear-gradient(135deg, #2c1810 0%, #5a3420 40%, #8b5e3c 70%, #2c1810 100%); }
.slide-card.finale { background: linear-gradient(135deg, #1a0a2e 0%, #c0392b 40%, #e74c3c 60%, #1a0a2e 100%); }
.slide-card h1 {
  font-family: 'Playfair Display', serif; font-size: clamp(2rem, 6vw, 5rem);
  font-weight: 700; line-height: 1.2; margin-bottom: 1rem; text-shadow: 2px 4px 20px rgba(0,0,0,.5);
}
.slide-card h2 {
  font-family: 'Playfair Display', serif; font-size: clamp(1.5rem, 4vw, 3.5rem);
  font-weight: 400; font-style: italic; line-height: 1.3; margin-bottom: 0.8rem; text-shadow: 2px 4px 20px rgba(0,0,0,.5);
}
.slide-card p {
  font-size: clamp(0.9rem, 2vw, 1.4rem); font-weight: 300; opacity: 0.85; max-width: 700px; line-height: 1.6;
}
#caption {
  position: fixed; bottom: 0; left: 0; right: 0; padding: 1.5rem 2rem 2rem;
  z-index: 10; text-align: center; pointer-events: none;
}
#caption-main {
  font-family: 'Playfair Display', serif; font-size: clamp(1.1rem, 3vw, 2rem);
  font-weight: 400; font-style: italic; text-shadow: 1px 2px 12px rgba(0,0,0,.8); line-height: 1.4;
}
#caption-sub {
  font-size: clamp(0.7rem, 1.5vw, 1rem); font-weight: 300; opacity: 0.7;
  margin-top: 0.3rem; text-shadow: 1px 2px 8px rgba(0,0,0,.8);
}
#progress { position: fixed; bottom: 0; left: 0; height: 3px; background: rgba(255,255,255,0.7); transition: width 0.3s ease; z-index: 20; }
#controls {
  position: fixed; top: 1rem; right: 1.5rem; font-size: 0.75rem; opacity: 0;
  transition: opacity 0.5s; z-index: 20; text-align: right; line-height: 1.8; pointer-events: none;
}
body.paused #controls { opacity: 0.6; }
#pause-indicator {
  position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
  font-size: 4rem; opacity: 0; transition: opacity 0.3s; z-index: 30; pointer-events: none; text-shadow: 2px 4px 20px rgba(0,0,0,.8);
}
#pause-indicator.show { opacity: 0.8; }
#counter { position: fixed; top: 1rem; left: 1.5rem; font-size: 0.75rem; opacity: 0; transition: opacity 0.5s; z-index: 20; pointer-events: none; }
body.paused #counter { opacity: 0.5; }
#slide-id {
  position: fixed; bottom: 0.8rem; right: 1.5rem; font-size: 0.9rem; opacity: 1;
  z-index: 20; pointer-events: none; font-family: 'Inter', monospace;
  color: #fff; text-shadow: 1px 1px 6px rgba(0,0,0,.9);
}
.slide-video {
  position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
  background: #000; opacity: 0; transition: opacity 1.2s ease;
}
.slide-video.active { opacity: 1; }
.slide-video video { max-width: 90vw; max-height: 85vh; border-radius: 4px; }
</style>
</head>

async function decryptSlides(password) {
  var raw = atob(ENCRYPTED_PAYLOAD);
  var enc = new Uint8Array(raw.length);
  for (var i = 0; i < raw.length; i++) enc[i] = raw.charCodeAt(i);
  var salt = enc.slice(0, 16);
  var iv = enc.slice(16, 28);
  var tag = enc.slice(28, 44);
  var data = enc.slice(44);
  var ciphertext = new Uint8Array(data.length + tag.length);
  ciphertext.set(data);
  ciphertext.set(tag, data.length);
  try {
    var keyMaterial = await crypto.subtle.importKey('raw', new TextEncoder().encode(password), 'PBKDF2', false, ['deriveKey']);
    var aesKey = await crypto.subtle.deriveKey({name:'PBKDF2', salt:salt, iterations:100000, hash:'SHA-256'}, keyMaterial, {name:'AES-GCM', length:256}, false, ['decrypt']);
    var decrypted = await crypto.subtle.decrypt({name:'AES-GCM', iv:iv}, aesKey, ciphertext);
    SLIDES = JSON.parse(new TextDecoder().decode(decrypted));
    return true;
  } catch (e) { return false; }
}

function buildCard(s) {
  var d = document.createElement('div');
  d.className = 'slide-card ' + (s.c || '');
  if (s.h2) { var h2 = document.createElement('h2'); h2.textContent = s.h2; d.appendChild(h2); }
  if (s.h1) { var h1 = document.createElement('h1'); h1.textContent = s.h1; d.appendChild(h1); }
  if (s.p) { var p = document.createElement('p'); p.textContent = s.p; p.style.whiteSpace = 'pre-line'; d.appendChild(p); }
  return d;
}

function showSlide(index) {

    container.appendChild(card);
    requestAnimationFrame(function() { card.classList.add('active'); });
    capWrap.style.display = 'none';
  } else if (s.t === 'vid') {
    var vd = document.createElement('div'); vd.className = 'slide-video';
    var vid = document.createElement('video');
    vid.src = 'images/' + s.s; vid.controls = true; vid.autoplay = true; vid.playsInline = true;
    vd.appendChild(vid); container.appendChild(vd);
    requestAnimationFrame(function() { vd.classList.add('active'); });
    capMain.textContent = s.cap || ''; capSub.textContent = s.sub || '';
    capWrap.style.display = (s.cap || s.sub) ? '' : 'none';
  } else {
    var div = document.createElement('div'); div.className = 'slide-img';
    div.style.backgroundImage = "url('images/" + s.s + "')";
    container.appendChild(div);
    requestAnimationFrame(function() { div.classList.add('active'); });
    capMain.textContent = s.cap || ''; capSub.textContent = s.sub || '';
    capWrap.style.display = '';
  }
  progressEl.style.width = ((index + 1) / SLIDES.length * 100) + '%';
  counterEl.textContent = (index + 1) + ' / ' + SLIDES.length;
  slideIdEl.textContent = s.s ? '# ' + s.s.replace(/\.[^.]+$/, '') : '';
  if (index + 1 < SLIDES.length && SLIDES[index + 1].t === 'img') {
    var img = new Image(); img.src = 'images/' + SLIDES[index + 1].s;
  }
}

function getDuration(i) { var s = SLIDES[i]; if (s.d) return s.d; if (s.t === 'vid') return 15000; return baseInterval; }

function scheduleNext() {
  clearTimeout(timer); if (paused) return;
  timer = setTimeout(function() { if (current < SLIDES.length - 1) { current++; showSlide(current); scheduleNext(); } }, getDuration(current));
}

function goTo(i) { if (i < 0) i = 0; if (i >= SLIDES.length) i = SLIDES.length - 1; current = i; showSlide(current); if (!paused) scheduleNext(); }

function togglePause() {
  paused = !paused; document.body.classList.toggle('paused', paused);
  pauseEl.textContent = paused ? '\u23F8 Pauze' : '\u25B6';
  pauseEl.classList.add('show'); setTimeout(function() { pauseEl.classList.remove('show'); }, 1200);
  if (!paused) scheduleNext(); else clearTimeout(timer);
}

document.addEventListener('keydown', function(e) {
  switch(e.key) {
    case ' ': case 'p': e.preventDefault(); togglePause(); break;
    case 'ArrowRight': case 'n': goTo(current + 1); break;
    case 'ArrowLeft': case 'b': goTo(current - 1); break;
    case 'f': if (!document.fullscreenElement) document.documentElement.requestFullscreen(); else document.exitFullscreen(); break;
    case '+': case '=': baseInterval = Math.max(2000, baseInterval - 500); break;
    case '-': baseInterval = Math.min(15000, baseInterval + 500); break;
    case 'Home': goTo(0); break;
    case 'End': goTo(SLIDES.length - 1); break;
  }
});

document.addEventListener('click', function(e) {
  if (e.target.closest('video')) return;
  if (e.clientX < window.innerWidth * 0.3) goTo(current - 1);
  else if (e.clientX > window.innerWidth * 0.7) goTo(current + 1);
  else togglePause();
});

var touchStartX = 0;
document.addEventListener('touchstart', function(e) { touchStartX = e.touches[0].clientX; });
document.addEventListener('touchend', function(e) {
  var dx = e.changedTouches[0].clientX - touchStartX;
  if (Math.abs(dx) > 50) { if (dx > 0) goTo(current - 1); else goTo(current + 1); }
});


document.addEventListener('DOMContentLoaded', function() {
  var ov = document.createElement('div');
  ov.id = 'pw-overlay';
  ov.style.cssText = 'position:fixed;inset:0;z-index:9999;background:linear-gradient(135deg,#1a0a2e,#2d1b4e 50%,#1a0a2e);display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:Playfair Display,serif;';
  var t = document.createElement('h1');
  t.textContent = 'Bart & Sabine';
  t.style.cssText = 'color:#fff;font-size:clamp(2rem,5vw,4rem);margin-bottom:0.5rem;text-shadow:2px 4px 20px rgba(0,0,0,.5);';
  var s = document.createElement('p');
  s.textContent = '20 Jaar Getrouwd';
  s.style.cssText = 'color:#fff;font-size:clamp(1rem,2.5vw,1.8rem);font-style:italic;opacity:0.8;margin-bottom:2rem;font-family:Playfair Display,serif;';
  var f = document.createElement('form');
  f.style.cssText = 'display:flex;flex-direction:column;align-items:center;gap:1rem;';
  var inp = document.createElement('input');
  inp.type = 'password'; inp.placeholder = 'Wachtwoord'; inp.autocomplete = 'off';
  inp.style.cssText = 'padding:0.8rem 1.5rem;font-size:1.1rem;border:2px solid rgba(255,255,255,0.3);border-radius:8px;background:rgba(255,255,255,0.1);color:#fff;text-align:center;outline:none;width:280px;font-family:Inter,sans-serif;';
  var btn = document.createElement('button');
  btn.type = 'submit'; btn.textContent = 'Bekijk presentatie';
  btn.style.cssText = 'padding:0.7rem 2rem;font-size:1rem;border:none;border-radius:8px;background:rgba(255,255,255,0.2);color:#fff;cursor:pointer;font-family:Inter,sans-serif;';
  var err = document.createElement('p');
  err.style.cssText = 'color:#e74c3c;font-size:0.9rem;font-family:Inter,sans-serif;min-height:1.5em;';
  f.appendChild(inp); f.appendChild(btn); f.appendChild(err);
  ov.appendChild(t); ov.appendChild(s); ov.appendChild(f);
  document.body.appendChild(ov);
  inp.focus();
  f.addEventListener('submit', async function(e) {
    e.preventDefault();
    btn.textContent = 'Even geduld...'; btn.disabled = true;
    var ok = await decryptSlides(inp.value);
    if (ok) {
      ov.style.transition = 'opacity 0.8s'; ov.style.opacity = '0';
      setTimeout(function() { ov.remove(); showSlide(0); scheduleNext(); }, 800);
    } else {
      err.textContent = 'Verkeerd wachtwoord!';
      inp.value = ''; inp.focus();
      btn.textContent = 'Bekijk presentatie'; btn.disabled = false;
    }
  });
});
</script>
